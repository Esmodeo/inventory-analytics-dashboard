<section class="stock-analysis-page">
  <header class="stock-analysis-page__header">
    <div>
      <h1 class="stock-analysis-page__title">Stock Analysis</h1>
      <p class="stock-analysis-page__subtitle">Detailed inventory movement and category insights</p>
    </div>
  </header>

  <section class="stock-analysis-page__filters">
    <div class="stock-analysis-page__filter">Date Range</div>
    <div class="stock-analysis-page__filter">Category</div>
    <div class="stock-analysis-page__filter">Warehouse</div>
    <div class="stock-analysis-page__filter stock-analysis-page__filter--action">Export</div>
  </section>

  <section class="stock-analysis-page__chart">
    <app-chart-widget title="Stock Movement" [chartOptions]="stockMovementChartOptions" />
  </section>
</section>
