<p-button
  icon="pi pi-bars"
  severity="secondary"
  [outlined]="true"
  title="Toogle sidemenu"
  (onClick)="closeSidebar()"
/>
<h1 class="text-2xl grow">{{ title }}</h1>
<p-button
  [icon]="isDark ? 'pi pi-moon' : 'pi pi-sun'"
  severity="secondary"
  (onClick)="toggleDarkMode()"
  [title]="isDark ? 'Switch to light mode' : 'Switch to dark mode'"
/>
