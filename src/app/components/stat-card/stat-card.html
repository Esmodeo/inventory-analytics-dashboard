<p-card>
  <div class="stat-card">
    <div>
      <p class="text-muted mbe-4">{{ title() }}</p>
      <h3 class="text-2xl font-bold">{{ value() }}</h3>
    </div>

    @if (icon()) {
      <div class="stat-card__icon">
        <i [class]="icon()" [style]="{ color: iconColor() }"></i>
      </div>
    }
  </div>

  @if (subtitle()) {
    <p class="text-muted text-sm mbs-4">{{ subtitle() }}</p>
  }
</p-card>
